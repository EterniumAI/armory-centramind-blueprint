name: Provision tenant Centramind deployment

on:
  workflow_dispatch:
    inputs:
      lead_id:
        type: string
        required: true
      slug:
        type: string
        required: true
      business_name:
        type: string
        required: true
      primary_color:
        type: string
        required: false
        default: '#06b6d4'
      company_name:
        type: string
        required: false
        default: ''
      logo_url:
        type: string
        required: false
        default: ''
      eternium_api_key:
        type: string
        required: true

concurrency:
  group: provision-${{ github.event.inputs.slug }}
  cancel-in-progress: false

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Patch theme.config.js for tenant
        env:
          PRIMARY_COLOR: ${{ github.event.inputs.primary_color }}
          COMPANY_NAME: ${{ github.event.inputs.company_name }}
          LOGO_URL: ${{ github.event.inputs.logo_url }}
        run: node scripts/patch-tenant-theme.cjs

      - name: Write tenant config
        run: |
          mkdir -p state
          cat > state/tenant.json <<EOF
          {
            "tenant_slug": "${{ github.event.inputs.slug }}",
            "business_name": "${{ github.event.inputs.business_name }}",
            "eternium_api_key": "${{ github.event.inputs.eternium_api_key }}"
          }
          EOF

      - name: Install + Build
        run: npm ci && npm run build
        env:
          VITE_AUDIT_MODE: '0'
          VITE_TENANT_SLUG: ${{ github.event.inputs.slug }}

      - name: Deploy to centramind-<slug>
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name centramind-${{ github.event.inputs.slug }} --branch main --commit-dirty=true

      - name: Callback eternium-api
        if: always()
        env:
          STATUS: ${{ job.status }}
          SLUG: ${{ github.event.inputs.slug }}
          LEAD: ${{ github.event.inputs.lead_id }}
          CALLBACK_SECRET: ${{ secrets.BLUEPRINT_DEPLOY_CALLBACK_SECRET }}
        run: |
          if [ "$STATUS" = "success" ]; then
            STATUS_STR="success"
          else
            STATUS_STR="failed"
          fi
          curl -sS -X POST "https://api.eternium.ai/admin/leads/blueprint/$LEAD/deployment-complete" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: $CALLBACK_SECRET" \
            --data "{\"status\":\"$STATUS_STR\",\"deployment_url\":\"https://$SLUG.eternium.ai\"}"
